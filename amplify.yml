version: 1
frontend:
  phases:
    preBuild:
      commands:
        # 앱 디렉토리로 이동 후 의존성 설치
        - cd app && npm ci
    build:
      commands:
        # 운영(Production) 빌드
        - cd app && NODE_ENV=production npm run build
  artifacts:
    # Amplify WEB_COMPUTE가 .next 폴더를 분석하여 SSR Lambda 자동 생성
    baseDirectory: app/.next
    files:
      - '**/*'
  cache:
    paths:
      # 빌드 속도 향상을 위한 캐시 설정
      - app/node_modules/**/*
      - app/.next/cache/**/*
