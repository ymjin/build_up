version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd app && npm ci
        - rm -rf app/.next
    build:
      commands:
        - cd app && NODE_ENV=production npm run build
        - ls -la app/.next/
        - ls -la app/.next/standalone/ 2>/dev/null || echo "standalone folder NOT FOUND"
        - mkdir -p .amplify-hosting/compute/default
        - mkdir -p .amplify-hosting/static/_next
        - cp -r app/.next/standalone/. .amplify-hosting/compute/default/
        - cp -r app/.next/static .amplify-hosting/static/_next/static
        - cp -r app/public/. .amplify-hosting/static/
        - "printf '{\"version\":1,\"routes\":[{\"path\":\"/_next/static/*\",\"target\":{\"kind\":\"Static\"},\"fallback\":null},{\"path\":\"/favicon.ico\",\"target\":{\"kind\":\"Static\"},\"fallback\":null},{\"path\":\"/*.*\",\"target\":{\"kind\":\"Static\"},\"fallback\":{\"kind\":\"Compute\",\"src\":\"default\"}},{\"path\":\"/*\",\"target\":{\"kind\":\"Compute\",\"src\":\"default\"},\"fallback\":null}],\"computeResources\":[{\"name\":\"default\",\"entrypoint\":\"server.js\",\"runtime\":\"nodejs18.x\"}],\"framework\":{\"name\":\"Next.js\",\"version\":\"16\"}}' > .amplify-hosting/deploy-manifest.json"
  artifacts:
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - app/node_modules/**/*
