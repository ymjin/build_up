version: 1
frontend:
  phases:
    preBuild:
      commands:
        # 앱 디렉토리로 이동 후 의존성 설치
        - cd app && npm ci
    build:
      commands:
        # 운영(Production) standalone 빌드
        - cd app && NODE_ENV=production npm run build
        # Amplify WEB_COMPUTE SSR을 위한 .amplify-hosting 폴더 구조 생성
        - mkdir -p .amplify-hosting/compute/default
        - mkdir -p .amplify-hosting/static/_next
        # standalone 빌드 결과물을 compute 폴더로 복사
        - cp -r app/.next/standalone/. .amplify-hosting/compute/default/
        # 정적 자산 복사
        - cp -r app/.next/static .amplify-hosting/static/_next/static
        - cp -r app/public/. .amplify-hosting/static/
        # SSR 배포 매니페스트 생성
        - |
          cat > .amplify-hosting/deploy-manifest.json << 'EOF'
          {
            "version": 1,
            "routes": [
              {
                "path": "/_next/static/*",
                "target": { "kind": "Static" },
                "fallback": null
              },
              {
                "path": "/favicon.ico",
                "target": { "kind": "Static" },
                "fallback": null
              },
              {
                "path": "/*.*",
                "target": { "kind": "Static" },
                "fallback": { "kind": "Compute", "src": "default" }
              },
              {
                "path": "/*",
                "target": { "kind": "Compute", "src": "default" },
                "fallback": null
              }
            ],
            "computeResources": [
              {
                "name": "default",
                "entrypoint": "server.js",
                "runtime": "nodejs18.x"
              }
            ],
            "framework": {
              "name": "Next.js",
              "version": "15"
            }
          }
          EOF
  artifacts:
    # Amplify WEB_COMPUTE SSR은 .amplify-hosting 폴더를 artifact로 사용
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      # 빌드 속도 향상을 위한 캐시 설정
      - app/node_modules/**/*
      - app/.next/cache/**/*
